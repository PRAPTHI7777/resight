<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <form class="login-card" id="loginForm">
    <h2 class="login-title">Login</h2>
    
    <input id="email" type="email" class="login-input" placeholder="Email" required>
    <input id="password" type="password" class="login-input" placeholder="Password" required>
    
    <div class="login-options">
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>
    
   <button id="loginBtn" class="login-btn" type="submit">Login</button>
   <p class="noacc"> Don't have an account? <a href="signup.html" class="signup-link">Sign Up</a></p>
  </form>
  <script src="login.js"></script>
</body>

</html>
