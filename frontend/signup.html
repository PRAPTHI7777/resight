<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">

  <form id="signupForm"class="signup-card">
    <h2 class="login-title">Sign Up</h2>
    <input id="username" type="text" class="login-input" placeholder="Username" required>
    <input id="email" type="email" class="login-input" placeholder="Email" required>
    <input id="password" type="password" class="login-input" placeholder="Password" required>
    
    <button type="submit" class="login-btn">Sign Up</button>
    <p id="message"></p>
    <p class="noacc"> Already have an account? <a href="login.html" class="signup-link">Login</a></p>
  </form>
<script src="signup.js"></script>
</body>
</html>
